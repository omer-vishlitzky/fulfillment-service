apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: fulfillment-api
spec:
  selector:
    app: fulfillment-ingress-proxy
  ports:
  - name: external-api
    port: 8000
    targetPort: external-api

---

apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: fulfillment-internal-api
spec:
  selector:
    app: fulfillment-ingress-proxy
  ports:
  - name: internal-api
    port: 8001
    targetPort: internal-api

---

apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: fulfillment-ingress-proxy-metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8002"
spec:
  selector:
    app: fulfillment-ingress-proxy
  ports:
  - name: metrics
    port: 8002
    targetPort: metrics
