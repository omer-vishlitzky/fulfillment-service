syntax = "proto3";

package osac.private.v1;

// BreakGlassCredentials contains break-glass account credentials for IdP users.
// This is only returned during account creation and must be stored securely by the caller.
message BreakGlassCredentials {
  // Username for the account.
  string username = 1;

  // Password for the account.
  // SECURITY: This field contains sensitive data and should be handled carefully:
  // - Only transmitted over TLS
  // - Store in a secure secrets manager (Vault, Kubernetes Secrets, AWS Secrets Manager)
  // - Never log this value
  // - Clear from memory after use
  string password = 2;
}
