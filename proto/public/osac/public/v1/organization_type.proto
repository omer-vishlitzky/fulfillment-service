syntax = "proto3";

package osac.public.v1;

import "osac/public/v1/metadata_type.proto";

// An organization groups tenants and resources for a customer or business unit.
message Organization {
  // Unique identifier of the organization.
  string id = 1;

  Metadata metadata = 2;

  OrganizationSpec spec = 3;
}

message OrganizationSpec {
  // Human friendly description of the organization, using Markdown format.
  string description = 1;
}
